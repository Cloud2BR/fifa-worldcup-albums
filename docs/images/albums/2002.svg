<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg02" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c60b1e"/>
      <stop offset="40%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#2c0a0a"/>
    </linearGradient>
    <radialGradient id="ball02g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh02"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg02)"/>

  <!-- Rising sun pattern (Japan) -->
  <g transform="translate(240,100)" opacity="0.15">
    <circle r="55" fill="#c60b1e"/>
    <g stroke="#c60b1e" stroke-width="4" opacity="0.5">
      <line x1="0" y1="-70" x2="0" y2="-130"/>
      <line x1="0" y1="70" x2="0" y2="130"/>
      <line x1="-70" y1="0" x2="-130" y2="0"/>
      <line x1="70" y1="0" x2="130" y2="0"/>
      <line x1="-49.5" y1="-49.5" x2="-91.9" y2="-91.9"/>
      <line x1="49.5" y1="-49.5" x2="91.9" y2="-91.9"/>
      <line x1="-49.5" y1="49.5" x2="-91.9" y2="91.9"/>
      <line x1="49.5" y1="49.5" x2="91.9" y2="91.9"/>
    </g>
  </g>

  <!-- Wave pattern (Korea/Japan) -->
  <g opacity="0.1" fill="none" stroke="#ffffff" stroke-width="2.5">
    <path d="M0,500 Q60,480 120,500 Q180,520 240,500 Q300,480 360,500 Q420,520 480,500"/>
    <path d="M0,520 Q60,500 120,520 Q180,540 240,520 Q300,500 360,520 Q420,540 480,520"/>
    <path d="M0,540 Q60,520 120,540 Q180,560 240,540 Q300,520 360,540 Q420,560 480,540"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.82"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#c60b1e" stroke-width="1.5" opacity="0.5"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#c60b1e" opacity="0.95"/>
  <rect x="16" y="52" width="448" height="16" fill="#c60b1e" opacity="0.95"/>
  <text x="240" y="51" text-anchor="middle" fill="#ffffff" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- Korea/Japan stripe -->
  <rect x="16" y="68" width="224" height="8" fill="#c60b1e" opacity="0.9"/>
  <rect x="240" y="68" width="224" height="8" fill="#ffffff" opacity="0.55"/>

  <!-- Soccer ball (Fevernova) -->
  <g transform="translate(240,240)" filter="url(#sh02)">
    <circle r="74" fill="url(#ball02g)"/>
    <!-- Fevernova gold pattern -->
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#c60b1e" opacity="0.7"/>
    <polygon points="0,-74 20,-55 20,-32 0,-32 -20,-32 -20,-55" fill="#c60b1e" opacity="0.5"/>
    <polygon points="0,-32 30,-10 52,12 46,40 18.5,26" fill="#c60b1e" opacity="0.25"/>
    <polygon points="0,-32 -30,-10 -52,12 -46,40 -18.5,26" fill="#c60b1e" opacity="0.25"/>
    <text x="0" y="5" text-anchor="middle" fill="#555" font-size="8" font-family="Arial, sans-serif" opacity="0.6">FEVERNOVA</text>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="354" text-anchor="middle" fill="#ffffff" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.95">FIFA WORLD CUP</text>
  <text x="240" y="428" text-anchor="middle" fill="#ffffff" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh02)">2002</text>

  <rect x="86" y="444" width="308" height="40" rx="8" fill="#8b0000" opacity="0.85"/>
  <text x="240" y="467" text-anchor="middle" fill="#ffffff" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1">SOUTH KOREA / JAPAN</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#8b0000" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#c60b1e" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">576 STICKERS · OFFICIAL COLLECTION</text>
</svg>

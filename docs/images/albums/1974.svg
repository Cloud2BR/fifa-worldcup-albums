<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg74" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="45%" stop-color="#cc0000"/>
      <stop offset="100%" stop-color="#cc9900"/>
    </linearGradient>
    <radialGradient id="ball74g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#bbbbbb"/>
    </radialGradient>
    <filter id="sh74">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000066"/>
    </filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg74)"/>

  <!-- Diagonal stripes -->
  <g opacity="0.08">
    <line x1="-40" y1="0" x2="480" y2="520" stroke="#ffcc00" stroke-width="30"/>
    <line x1="0" y1="0" x2="480" y2="480" stroke="#ffcc00" stroke-width="30"/>
    <line x1="80" y1="0" x2="480" y2="400" stroke="#ffcc00" stroke-width="30"/>
    <line x1="160" y1="0" x2="480" y2="320" stroke="#ffcc00" stroke-width="30"/>
    <line x1="240" y1="0" x2="480" y2="240" stroke="#ffcc00" stroke-width="30"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#ffcc00" stroke-width="5" opacity="0.9"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#ffcc00" stroke-width="1.5" opacity="0.4"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#000000" opacity="0.88"/>
  <rect x="16" y="52" width="448" height="16" fill="#000000" opacity="0.88"/>
  <text x="240" y="51" text-anchor="middle" fill="#ffcc00" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- German flag stripes on top -->
  <rect x="16" y="68" width="448" height="7" fill="#000000" opacity="0.8"/>
  <rect x="16" y="75" width="448" height="7" fill="#cc0000" opacity="0.8"/>
  <rect x="16" y="82" width="448" height="7" fill="#ffcc00" opacity="0.8"/>

  <!-- Trophy silhouette -->
  <g transform="translate(240,165)" opacity="0.25" fill="#ffcc00">
    <rect x="-8" y="-60" width="16" height="60"/>
    <rect x="-22" y="-5" width="44" height="8" rx="3"/>
    <ellipse cx="0" cy="-65" rx="28" ry="35"/>
    <path d="M-28,-50 Q-50,-30 -45,-10 Q-40,5 -22,5" fill="none" stroke="#ffcc00" stroke-width="6"/>
    <path d="M28,-50 Q50,-30 45,-10 Q40,5 22,5" fill="none" stroke="#ffcc00" stroke-width="6"/>
  </g>

  <!-- Soccer ball -->
  <g transform="translate(240,235)" filter="url(#sh74)">
    <circle r="74" fill="url(#ball74g)"/>
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#1a1a1a" opacity="0.88"/>
    <polygon points="0,-74 20,-55 20,-32 0,-32 -20,-32 -20,-55" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="0,-32 30,-10 52,12 46,40 18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <polygon points="0,-32 -30,-10 -52,12 -46,40 -18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="350" text-anchor="middle" fill="#ffffff" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.9">FIFA WORLD CUP</text>
  <text x="240" y="425" text-anchor="middle" fill="#ffcc00" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh74)">1974</text>

  <!-- Host country pill -->
  <rect x="110" y="442" width="260" height="40" rx="8" fill="#000000" opacity="0.75"/>
  <text x="240" y="468" text-anchor="middle" fill="#ffcc00" font-size="18" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">WEST GERMANY</text>

  <!-- Bottom band -->
  <rect x="16" y="560" width="448" height="64" rx="0" fill="#000000" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#1a1a1a" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#ffcc00" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">366 STICKERS · OFFICIAL COLLECTION</text>
</svg>

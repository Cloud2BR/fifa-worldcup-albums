<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg82" x1="0" y1="0" x2="0.6" y2="1">
      <stop offset="0%" stop-color="#c60b1e"/>
      <stop offset="50%" stop-color="#aa0000"/>
      <stop offset="100%" stop-color="#ffc400"/>
    </linearGradient>
    <radialGradient id="ball82g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh82"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg82)"/>

  <!-- Spanish flag color bands -->
  <rect x="0" y="0" width="480" height="160" fill="#c60b1e" opacity="0.4"/>
  <rect x="0" y="160" width="480" height="320" fill="#ffc400" opacity="0.15"/>
  <rect x="0" y="480" width="480" height="160" fill="#c60b1e" opacity="0.4"/>

  <!-- Diagonal ornament lines -->
  <g opacity="0.12" stroke="#ffc400" stroke-width="2">
    <line x1="0" y1="100" x2="480" y2="540"/>
    <line x1="0" y1="200" x2="480" y2="640"/>
    <line x1="0" y1="0" x2="480" y2="440"/>
    <line x1="100" y1="0" x2="480" y2="380"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#ffc400" stroke-width="5" opacity="0.9"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#ffc400" stroke-width="1.5" opacity="0.4"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#c60b1e" opacity="0.95"/>
  <rect x="16" y="52" width="448" height="16" fill="#c60b1e" opacity="0.95"/>
  <text x="240" y="51" text-anchor="middle" fill="#ffc400" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- Spain flag stripes -->
  <rect x="16" y="68" width="448" height="7" fill="#c60b1e" opacity="0.9"/>
  <rect x="16" y="75" width="448" height="8" fill="#ffc400" opacity="0.9"/>
  <rect x="16" y="83" width="448" height="7" fill="#c60b1e" opacity="0.9"/>

  <!-- Naranjito-style orange sphere accent -->
  <circle cx="240" cy="145" r="38" fill="#ff8c00" opacity="0.22"/>
  <circle cx="240" cy="145" r="30" fill="none" stroke="#ffc400" stroke-width="2" opacity="0.3"/>

  <!-- Soccer ball -->
  <g transform="translate(240,240)" filter="url(#sh82)">
    <circle r="74" fill="url(#ball82g)"/>
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#1a1a1a" opacity="0.88"/>
    <polygon points="0,-74 20,-55 20,-32 0,-32 -20,-32 -20,-55" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="0,-32 30,-10 52,12 46,40 18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <polygon points="0,-32 -30,-10 -52,12 -46,40 -18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="354" text-anchor="middle" fill="#ffffff" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.95">FIFA WORLD CUP</text>
  <text x="240" y="428" text-anchor="middle" fill="#ffc400" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh82)">1982</text>

  <rect x="128" y="444" width="224" height="40" rx="8" fill="#c60b1e" opacity="0.85"/>
  <text x="240" y="470" text-anchor="middle" fill="#ffc400" font-size="20" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">SPAIN</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#8b0000" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#8b0000" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#ffc400" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">427 STICKERS · OFFICIAL COLLECTION</text>
</svg>

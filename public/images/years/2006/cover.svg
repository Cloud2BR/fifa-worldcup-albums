<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg06" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#000000"/>
      <stop offset="45%" stop-color="#2a0a0a"/>
      <stop offset="100%" stop-color="#cc0000"/>
    </linearGradient>
    <radialGradient id="ball06g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh06"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg06)"/>

  <!-- German eagle geometric motif -->
  <g opacity="0.1" fill="#ffcc00">
    <path d="M240,80 L270,130 L320,130 L280,160 L300,210 L240,180 L180,210 L200,160 L160,130 L210,130 Z"/>
  </g>

  <!-- German flag vertical bar accent -->
  <g opacity="0.12">
    <rect x="0" y="0" width="160" height="640" fill="#1a1a1a"/>
    <rect x="160" y="0" width="160" height="640" fill="#cc0000"/>
    <rect x="320" y="0" width="160" height="640" fill="#ffcc00"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#ffcc00" stroke-width="5" opacity="0.88"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#ffcc00" stroke-width="1.5" opacity="0.4"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#cc0000" opacity="0.95"/>
  <rect x="16" y="52" width="448" height="16" fill="#cc0000" opacity="0.95"/>
  <text x="240" y="51" text-anchor="middle" fill="#ffcc00" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- German flag stripes -->
  <rect x="16" y="68" width="448" height="7" fill="#000000" opacity="0.9"/>
  <rect x="16" y="75" width="448" height="7" fill="#cc0000" opacity="0.9"/>
  <rect x="16" y="82" width="448" height="7" fill="#ffcc00" opacity="0.9"/>

  <!-- Soccer ball (Teamgeist) -->
  <g transform="translate(240,240)" filter="url(#sh06)">
    <circle r="74" fill="url(#ball06g)"/>
    <!-- Teamgeist petal pattern -->
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#1a1a1a" opacity="0.88"/>
    <polygon points="0,-74 20,-55 20,-32 0,-32 -20,-32 -20,-55" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="0,-32 30,-10 52,12 46,40 18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <polygon points="0,-32 -30,-10 -52,12 -46,40 -18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" fill="#555" font-size="8" font-family="Arial, sans-serif" opacity="0.6">TEAMGEIST</text>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="354" text-anchor="middle" fill="#ffcc00" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.95">FIFA WORLD CUP</text>
  <text x="240" y="428" text-anchor="middle" fill="#ffcc00" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh06)">2006</text>

  <rect x="110" y="444" width="260" height="40" rx="8" fill="#000000" opacity="0.85"/>
  <text x="240" y="470" text-anchor="middle" fill="#ffcc00" font-size="20" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">GERMANY</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#000000" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#cc0000" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#ffcc00" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">596 STICKERS · OFFICIAL COLLECTION</text>
</svg>

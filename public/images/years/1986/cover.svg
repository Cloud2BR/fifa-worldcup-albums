<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg86" x1="0" y1="0" x2="0.7" y2="1">
      <stop offset="0%" stop-color="#006847"/>
      <stop offset="50%" stop-color="#007040"/>
      <stop offset="100%" stop-color="#004d30"/>
    </linearGradient>
    <radialGradient id="ball86g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh86"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg86)"/>

  <!-- Mexican flag color bands subtle -->
  <rect x="0" y="0" width="160" height="640" fill="#006847" opacity="0.25"/>
  <rect x="160" y="0" width="160" height="640" fill="#ffffff" opacity="0.08"/>
  <rect x="320" y="0" width="160" height="640" fill="#ce1126" opacity="0.18"/>

  <!-- Aztec decorative border pattern -->
  <g opacity="0.18" fill="#f5e642">
    <rect x="30" y="110" width="12" height="12"/>
    <rect x="48" y="110" width="12" height="12"/>
    <rect x="30" y="128" width="12" height="12"/>
    <rect x="438" y="110" width="12" height="12"/>
    <rect x="420" y="110" width="12" height="12"/>
    <rect x="438" y="128" width="12" height="12"/>
    <rect x="30" y="500" width="12" height="12"/>
    <rect x="48" y="500" width="12" height="12"/>
    <rect x="30" y="518" width="12" height="12"/>
    <rect x="438" y="500" width="12" height="12"/>
    <rect x="420" y="500" width="12" height="12"/>
    <rect x="438" y="518" width="12" height="12"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#f5e642" stroke-width="5" opacity="0.88"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#f5e642" stroke-width="1.5" opacity="0.4"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#ce1126" opacity="0.92"/>
  <rect x="16" y="52" width="448" height="16" fill="#ce1126" opacity="0.92"/>
  <text x="240" y="51" text-anchor="middle" fill="#f5e642" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- Mexico flag stripes -->
  <rect x="16" y="68" width="148" height="8" fill="#006847" opacity="0.9"/>
  <rect x="164" y="68" width="152" height="8" fill="#ffffff" opacity="0.9"/>
  <rect x="316" y="68" width="148" height="8" fill="#ce1126" opacity="0.9"/>

  <!-- Soccer ball (Azteca 86) -->
  <g transform="translate(240,240)" filter="url(#sh86)">
    <circle r="74" fill="url(#ball86g)"/>
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#1a1a1a" opacity="0.88"/>
    <polygon points="0,-74 20,-55 20,-32 0,-32 -20,-32 -20,-55" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="0,-32 30,-10 52,12 46,40 18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <polygon points="0,-32 -30,-10 -52,12 -46,40 -18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <!-- "Azteca" label on ball -->
  <text x="240" y="244" text-anchor="middle" fill="#006847" font-size="10" font-family="Arial, sans-serif" font-weight="700" opacity="0.6">AZTECA</text>

  <text x="240" y="354" text-anchor="middle" fill="#f5e642" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.95">FIFA WORLD CUP</text>
  <text x="240" y="428" text-anchor="middle" fill="#f5e642" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh86)">1986</text>

  <rect x="128" y="444" width="224" height="40" rx="8" fill="#ce1126" opacity="0.85"/>
  <text x="240" y="470" text-anchor="middle" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700" letter-spacing="2">MEXICO</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#004d30" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#004d30" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#f5e642" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">427 STICKERS · OFFICIAL COLLECTION</text>
</svg>

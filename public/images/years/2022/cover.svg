<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg22" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#8d1b3d"/>
      <stop offset="50%" stop-color="#6e1430"/>
      <stop offset="100%" stop-color="#3a0818"/>
    </linearGradient>
    <radialGradient id="ball22g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh22"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg22)"/>

  <!-- Qatari wave / falcate pattern -->
  <g opacity="0.14" fill="none" stroke="#ffffff" stroke-width="3">
    <path d="M0,420 Q40,390 80,420 Q120,450 160,420 Q200,390 240,420 Q280,450 320,420 Q360,390 400,420 Q440,450 480,420"/>
    <path d="M0,450 Q40,420 80,450 Q120,480 160,450 Q200,420 240,450 Q280,480 320,450 Q360,420 400,450 Q440,480 480,450"/>
    <path d="M0,480 Q40,450 80,480 Q120,510 160,480 Q200,450 240,480 Q280,510 320,480 Q360,450 400,480 Q440,510 480,480"/>
  </g>

  <!-- Geometric Islamic pattern -->
  <g opacity="0.1" fill="none" stroke="#f0c040" stroke-width="1.5">
    <polygon points="240,95 260,118 286,118 270,138 278,165 253,150 228,165 236,138 220,118 246,118"/>
    <polygon points="240,95 220,118 196,118 212,138 204,165 229,150 254,165 246,138 262,118 236,118" opacity="0.5"/>
  </g>

  <!-- Crescent and star subtle -->
  <g opacity="0.15" fill="none" stroke="#ffffff" stroke-width="2">
    <path d="M240,115 A30,30 0 1,1 210,105 A22,22 0 1,0 240,115 Z"/>
    <polygon points="262,85 265,94 274,94 267,100 270,109 262,103 254,109 257,100 250,94 259,94" fill="#ffffff" stroke="none"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#f0c040" stroke-width="5" opacity="0.88"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.35"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#8d1b3d" opacity="0.98"/>
  <rect x="16" y="52" width="448" height="16" fill="#8d1b3d" opacity="0.98"/>
  <text x="240" y="51" text-anchor="middle" fill="#f0c040" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- Qatar flag stripes (maroon/white) -->
  <rect x="16" y="68" width="330" height="8" fill="#8d1b3d" opacity="0.9"/>
  <rect x="346" y="68" width="118" height="8" fill="#ffffff" opacity="0.9"/>

  <!-- Soccer ball (Al Rihla) -->
  <g transform="translate(240,245)" filter="url(#sh22)">
    <circle r="74" fill="url(#ball22g)"/>
    <!-- Al Rihla dhow-sail pattern -->
    <path d="M0,-74 Q40,-50 50,-10 Q40,20 0,32 Q-40,20 -50,-10 Q-40,-50 0,-74 Z" fill="#8d1b3d" opacity="0.4"/>
    <path d="M50,-10 Q74,10 60,50 Q35,40 18.5,26 Q25,10 50,-10 Z" fill="#f0c040" opacity="0.4"/>
    <path d="M-50,-10 Q-74,10 -60,50 Q-35,40 -18.5,26 Q-25,10 -50,-10 Z" fill="#f0c040" opacity="0.4"/>
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#1a1a1a" opacity="0.6"/>
    <text x="0" y="5" text-anchor="middle" fill="#555" font-size="8" font-family="Arial, sans-serif" opacity="0.65">AL RIHLA</text>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="360" text-anchor="middle" fill="#f0c040" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.95">FIFA WORLD CUP</text>
  <text x="240" y="432" text-anchor="middle" fill="#f0c040" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh22)">2022</text>

  <rect x="128" y="448" width="224" height="40" rx="8" fill="#4a0c20" opacity="0.85"/>
  <text x="240" y="474" text-anchor="middle" fill="#f0c040" font-size="20" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">QATAR</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#3a0818" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#8d1b3d" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#f0c040" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">670 STICKERS · OFFICIAL COLLECTION</text>
</svg>

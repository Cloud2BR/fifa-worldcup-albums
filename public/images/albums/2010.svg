<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#007a4d"/>
      <stop offset="50%" stop-color="#005c39"/>
      <stop offset="100%" stop-color="#001f14"/>
    </linearGradient>
    <radialGradient id="ball10g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh10"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg10)"/>

  <!-- African geometric pattern (kente-inspired) -->
  <g opacity="0.12">
    <rect x="0" y="550" width="480" height="30" fill="#ffb612"/>
    <rect x="0" y="580" width="480" height="15" fill="#007a4d"/>
    <rect x="0" y="595" width="480" height="15" fill="#de3831"/>
    <rect x="0" y="100" width="480" height="15" fill="#ffb612"/>
    <rect x="0" y="115" width="480" height="10" fill="#007a4d"/>
  </g>

  <!-- South African flag diagonal bands subtle -->
  <g opacity="0.12">
    <polygon points="0,200 0,360 480,200" fill="#ffb612"/>
    <polygon points="0,360 0,440 480,260" fill="#007a4d"/>
    <polygon points="0,200 0,120 200,200" fill="#de3831"/>
  </g>

  <!-- Jabulani ball texture background circle -->
  <circle cx="240" cy="240" r="120" fill="#000000" opacity="0.08"/>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#ffb612" stroke-width="5" opacity="0.88"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#ffb612" stroke-width="1.5" opacity="0.4"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#de3831" opacity="0.95"/>
  <rect x="16" y="52" width="448" height="16" fill="#de3831" opacity="0.95"/>
  <text x="240" y="51" text-anchor="middle" fill="#ffb612" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- SA flag-inspired multi-stripe -->
  <rect x="16" y="68" width="112" height="8" fill="#de3831" opacity="0.9"/>
  <rect x="128" y="68" width="112" height="8" fill="#ffb612" opacity="0.9"/>
  <rect x="240" y="68" width="112" height="8" fill="#007a4d" opacity="0.9"/>
  <rect x="352" y="68" width="112" height="8" fill="#0032a0" opacity="0.9"/>

  <!-- Soccer ball (Jabulani) -->
  <g transform="translate(240,240)" filter="url(#sh10)">
    <circle r="74" fill="url(#ball10g)"/>
    <!-- Jabulani-style curved panels -->
    <path d="M0,-74 Q30,-50 30,-10 Q30,30 0,32 Q-30,30 -30,-10 Q-30,-50 0,-74 Z" fill="#007a4d" opacity="0.35"/>
    <path d="M30,-10 Q74,0 74,0 Q60,40 40,55 Q20,35 18.5,26 Z" fill="#ffb612" opacity="0.35"/>
    <path d="M-30,-10 Q-74,0 -74,0 Q-60,40 -40,55 Q-20,35 -18.5,26 Z" fill="#de3831" opacity="0.35"/>
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#1a1a1a" opacity="0.55"/>
    <text x="0" y="5" text-anchor="middle" fill="#555" font-size="8" font-family="Arial, sans-serif" opacity="0.65">JABULANI</text>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="354" text-anchor="middle" fill="#ffb612" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.95">FIFA WORLD CUP</text>
  <text x="240" y="428" text-anchor="middle" fill="#ffb612" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh10)">2010</text>

  <rect x="90" y="444" width="300" height="40" rx="8" fill="#007a4d" opacity="0.85"/>
  <text x="240" y="468" text-anchor="middle" fill="#ffffff" font-size="17" font-family="Arial, sans-serif" font-weight="700" letter-spacing="1">SOUTH AFRICA</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#001f14" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#007a4d" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#ffb612" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">638 STICKERS · OFFICIAL COLLECTION</text>
</svg>

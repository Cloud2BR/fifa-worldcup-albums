<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg98" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#002395"/>
      <stop offset="50%" stop-color="#0a3080"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="ball98g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh98"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg98)"/>

  <!-- Eiffel Tower silhouette -->
  <g opacity="0.12" fill="#ffffff">
    <polygon points="240,100 290,520 260,520 280,300 240,260 200,300 220,520 190,520"/>
    <rect x="195" y="340" width="90" height="10"/>
    <rect x="185" y="420" width="110" height="10"/>
  </g>

  <!-- Tricolour bands diagonal -->
  <g opacity="0.12">
    <rect x="0" y="0" width="160" height="640" fill="#002395"/>
    <rect x="160" y="0" width="160" height="640" fill="#ffffff"/>
    <rect x="320" y="0" width="160" height="#ed2939" fill="#ed2939"/>
    <rect x="320" y="0" width="160" height="640" fill="#ed2939"/>
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#ed2939" stroke-width="5" opacity="0.85"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#ed2939" opacity="0.95"/>
  <rect x="16" y="52" width="448" height="16" fill="#ed2939" opacity="0.95"/>
  <text x="240" y="51" text-anchor="middle" fill="#ffffff" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- French flag stripes -->
  <rect x="16" y="68" width="148" height="8" fill="#002395" opacity="0.9"/>
  <rect x="164" y="68" width="152" height="8" fill="#ffffff" opacity="0.9"/>
  <rect x="316" y="68" width="148" height="8" fill="#ed2939" opacity="0.9"/>

  <!-- Soccer ball (Tricolore) -->
  <g transform="translate(240,240)" filter="url(#sh98)">
    <circle r="74" fill="url(#ball98g)"/>
    <!-- Tricolore pattern patches -->
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#002395" opacity="0.7"/>
    <polygon points="0,-74 20,-55 20,-32 0,-32 -20,-32 -20,-55" fill="#ed2939" opacity="0.6"/>
    <polygon points="0,-32 30,-10 52,12 46,40 18.5,26" fill="#ed2939" opacity="0.25"/>
    <polygon points="0,-32 -30,-10 -52,12 -46,40 -18.5,26" fill="#002395" opacity="0.25"/>
    <text x="0" y="5" text-anchor="middle" fill="#444" font-size="8" font-family="Arial, sans-serif" opacity="0.6">TRICOLORE</text>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="354" text-anchor="middle" fill="#ffffff" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.95">FIFA WORLD CUP</text>
  <text x="240" y="428" text-anchor="middle" fill="#ffffff" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh98)">1998</text>

  <rect x="128" y="444" width="224" height="40" rx="8" fill="#ed2939" opacity="0.85"/>
  <text x="240" y="470" text-anchor="middle" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">FRANCE</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#002395" opacity="0.55"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#002395" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#ffffff" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">561 STICKERS · OFFICIAL COLLECTION</text>
</svg>

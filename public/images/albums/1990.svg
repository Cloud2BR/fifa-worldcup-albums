<svg xmlns="http://www.w3.org/2000/svg" width="480" height="640" viewBox="0 0 480 640">
  <defs>
    <linearGradient id="bg90" x1="0" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#009246"/>
      <stop offset="35%" stop-color="#f1f2f1"/>
      <stop offset="100%" stop-color="#ce2b37"/>
    </linearGradient>
    <radialGradient id="ball90g" cx="38%" cy="32%" r="62%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#cccccc"/>
    </radialGradient>
    <filter id="sh90"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#00000055"/></filter>
  </defs>

  <rect width="480" height="640" fill="url(#bg90)"/>

  <!-- Italian flag horizontal bands -->
  <rect x="0" y="0" width="480" height="213" fill="#009246" opacity="0.55"/>
  <rect x="0" y="213" width="480" height="213" fill="#f1f2f1" opacity="0.35"/>
  <rect x="0" y="426" width="480" height="214" fill="#ce2b37" opacity="0.55"/>

  <!-- Colosseum arch silhouette -->
  <g opacity="0.12" fill="#333">
    <rect x="30" y="380" width="420" height="180"/>
    <ellipse cx="90" cy="380" rx="35" ry="50"/>
    <ellipse cx="180" cy="380" rx="35" ry="50"/>
    <ellipse cx="270" cy="380" rx="35" ry="50"/>
    <ellipse cx="360" cy="380" rx="35" ry="50"/>
    <ellipse cx="430" cy="380" rx="35" ry="50"/>
    <!-- Remove ellipses (they fill, not punch holes - simplified) -->
  </g>

  <!-- Border -->
  <rect x="16" y="16" width="448" height="608" rx="18" fill="none" stroke="#ffffff" stroke-width="5" opacity="0.85"/>
  <rect x="24" y="24" width="432" height="592" rx="14" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>

  <!-- Panini band -->
  <rect x="16" y="16" width="448" height="52" rx="18" fill="#009246" opacity="0.95"/>
  <rect x="16" y="52" width="448" height="16" fill="#009246" opacity="0.95"/>
  <text x="240" y="51" text-anchor="middle" fill="#ffffff" font-size="22" font-family="Arial Black, Arial, sans-serif" font-weight="900" letter-spacing="4">PANINI</text>

  <!-- Italian flag stripes -->
  <rect x="16" y="68" width="148" height="8" fill="#009246" opacity="0.9"/>
  <rect x="164" y="68" width="152" height="8" fill="#f1f2f1" opacity="0.9"/>
  <rect x="316" y="68" width="148" height="8" fill="#ce2b37" opacity="0.9"/>

  <!-- Soccer ball (Etrusco Unico) -->
  <g transform="translate(240,240)" filter="url(#sh90)">
    <circle r="74" fill="url(#ball90g)"/>
    <!-- Etrusco-style triangular pattern -->
    <polygon points="0,-32 30,-10 18.5,26 -18.5,26 -30,-10" fill="#1a1a1a" opacity="0.88"/>
    <polygon points="0,-74 20,-55 20,-32 0,-32 -20,-32 -20,-55" fill="#1a1a1a" opacity="0.5"/>
    <polygon points="0,-32 30,-10 52,12 46,40 18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <polygon points="0,-32 -30,-10 -52,12 -46,40 -18.5,26" fill="#1a1a1a" opacity="0.2"/>
    <text x="0" y="5" text-anchor="middle" fill="#555" font-size="9" font-family="Arial, sans-serif" opacity="0.6">ETRUSCO</text>
    <circle r="74" fill="none" stroke="#aaa" stroke-width="1.5"/>
  </g>

  <text x="240" y="354" text-anchor="middle" fill="#333333" font-size="14" font-family="Arial, sans-serif" font-weight="700" letter-spacing="4" opacity="0.9">FIFA WORLD CUP</text>
  <text x="240" y="428" text-anchor="middle" fill="#ce2b37" font-size="88" font-family="Arial Black, Arial, sans-serif" font-weight="900" filter="url(#sh90)">1990</text>

  <rect x="128" y="444" width="224" height="40" rx="8" fill="#009246" opacity="0.85"/>
  <text x="240" y="470" text-anchor="middle" fill="#ffffff" font-size="20" font-family="Arial, sans-serif" font-weight="700" letter-spacing="3">ITALY</text>

  <rect x="16" y="560" width="448" height="64" rx="0" fill="#ce2b37" opacity="0.45"/>
  <rect x="16" y="605" width="448" height="19" rx="18" fill="#009246" opacity="0.8"/>
  <text x="240" y="590" text-anchor="middle" fill="#333" font-size="13" font-family="Arial, sans-serif" letter-spacing="1">448 STICKERS · OFFICIAL COLLECTION</text>
</svg>
